services:
#http://host.docker.internal:9092
  influxdb3-enterprise:
    image: influxdb:3-enterprise
    ports:
      - 8181:8181
    networks:
      - factory-net
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --plugin-dir=/var/lib/influxdb3/plugins
      - --cluster-id=cluster0
      - --license-email=${INFLUXDB3_LICENSE_EMAIL}
      - --license-type=${INFLUXDB3_LICENSE_TYPE}
    environment:
      - INFLUXDB3_LICENSE_EMAIL=${INFLUXDB3_LICENSE_EMAIL}
      - INFLUXDB3_LICENSE_TYPE=${INFLUXDB3_LICENSE_TYPE}
    volumes:
      - type: bind
        source: ./influxdb3/data
        target: /var/lib/influxdb3/data
      - type: bind
        source: ./influxdb3/plugins
        target: /var/lib/influxdb3/plugins
    extra_hosts:
      - "host.docker.internal:host-gateway"

  explorer:
    image: influxdata/influxdb3-ui:1.8.0
    container_name: influxdb3-explorer
    pull_policy: always
    command:
      - --mode=admin
    ports:
      - 8888:8080
    volumes:
      - type: bind
        source: ./influxdb3-ui/db
        target: /db
      - type: bind
        source: ./influxdb3-ui/config
        target: /app-root/config
        read_only: true
      - type: bind
        source: ./influxdb3-ui/ssl
        target: /etc/nginx/ssl
        read_only: true
    environment:
      SESSION_SECRET_KEY: ${EXPLORER_SESSION_SECRET_KEY}
    restart: unless-stopped
    networks:
      - factory-net

networks:
  factory-net:
    external: true